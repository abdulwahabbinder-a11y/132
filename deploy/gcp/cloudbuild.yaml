substitutions:
  _REGION: us-central1
  _REPO: docuforge
  _DOMAIN: docuforge.pro
  _VPC_CONNECTOR: docuforge-connector
  _FRONTEND_SERVICE: docuforge-frontend
  _API_SERVICE: docuforge-api
  _WORKER_SERVICE: docuforge-worker

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - ./backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend]
    waitFor: [build-backend]

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=https://${_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://api.${_DOMAIN}/api
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY
      - ./frontend
    secretEnv: [NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY]

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend]
    waitFor: [build-frontend]

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --timeout=300
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=^;^FRONTEND_URL=https://${_DOMAIN};CORS_ORIGINS=https://${_DOMAIN},https://www.${_DOMAIN}
      - --set-secrets=SUPABASE_URL=docuforge-supabase-url:latest,SUPABASE_SERVICE_KEY=docuforge-supabase-service-key:latest,SUPABASE_JWT_SECRET=docuforge-supabase-jwt:latest,STRIPE_SECRET_KEY=docuforge-stripe-secret:latest,STRIPE_WEBHOOK_SECRET=docuforge-stripe-webhook:latest,STRIPE_PRO_PRICE_ID=docuforge-stripe-price:latest,REDIS_URL=docuforge-redis-url:latest,NVIDIA_NIM_API_KEY=docuforge-nvidia-nim:latest,ELEVENLABS_API_KEY=docuforge-elevenlabs:latest,CLAUDE_API_KEY=docuforge-claude:latest,TAVILY_API_KEY=docuforge-tavily:latest,JINA_API_KEY=docuforge-jina:latest
    waitFor: [push-backend]

  - id: deploy-worker
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WORKER_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8080
      - --command=./worker_entrypoint.sh
      - --memory=4Gi
      - --cpu=2
      - --timeout=3600
      - --min-instances=1
      - --max-instances=2
      - --no-cpu-throttling
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-secrets=SUPABASE_URL=docuforge-supabase-url:latest,SUPABASE_SERVICE_KEY=docuforge-supabase-service-key:latest,SUPABASE_JWT_SECRET=docuforge-supabase-jwt:latest,REDIS_URL=docuforge-redis-url:latest,NVIDIA_NIM_API_KEY=docuforge-nvidia-nim:latest,ELEVENLABS_API_KEY=docuforge-elevenlabs:latest,CLAUDE_API_KEY=docuforge-claude:latest,TAVILY_API_KEY=docuforge-tavily:latest,JINA_API_KEY=docuforge-jina:latest
    waitFor: [push-backend]

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
    waitFor: [push-frontend]

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/docuforge-supabase-url/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/docuforge-supabase-anon-key/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
