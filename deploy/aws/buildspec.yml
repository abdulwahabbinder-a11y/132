version: 0.2

env:
  variables:
    DOMAIN: docuforge.pro
    STACK_NAME: docuforge
    ECS_CLUSTER: docuforge

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - export ACCOUNT_ID

  build:
    commands:
      - echo "Building DocuForge images..."
      - bash scripts/docker-build.sh
      - docker tag docuforge-api:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/docuforge/backend:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker tag docuforge-frontend:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/docuforge/frontend:$CODEBUILD_RESOLVED_SOURCE_VERSION

  post_build:
    commands:
      - echo "Pushing images..."
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/docuforge/backend:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/docuforge/frontend:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - echo "Deploying to ECS..."
      - bash deploy/aws/deploy.sh $CODEBUILD_RESOLVED_SOURCE_VERSION

artifacts:
  files:
    - "**/*"
