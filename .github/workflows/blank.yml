name: Deploy Frontend to AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Build
      run: |
        cd frontend
        npm install
        npm run build

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Upload to S3
      run: |
        # Hum 'out' folder ke andar ki files ko sync kar rahe hain
        aws s3 sync frontend/out/ s3://docuforge-serverless-frontendbucket-12t7hivg0fdb/ --region us-east-1 --delete
