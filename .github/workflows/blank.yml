name: Deploy to AWS ECR

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push API Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: docuforge/docuforge-serverless/api
        IMAGE_TAG: latest
      run: |
        docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Build, tag, and push Worker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: docuforge/docuforge-serverless/worker
        IMAGE_TAG: latest
      run: |
        # Pure project me automatic dhoondega ke worker ya dusri Dockerfile kahan hai
        if [ -f "backend/Dockerfile.worker" ]; then
          docker build -f backend/Dockerfile.worker -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        elif [ -f "backend/worker.Dockerfile" ]; then
          docker build -f backend/worker.Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        elif [ -f "Dockerfile" ]; then
          docker build -f Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        else
          # Agar alag file nahi hai to backend/Dockerfile ko hi worker image ke liye use karega (Kyunke monolithic backend me dono same file se chalte hain)
          docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        fi
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
