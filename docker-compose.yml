version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - asset_data:/tmp/docuforge
    depends_on:
      - redis

  worker:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - asset_data:/tmp/docuforge
    depends_on:
      - redis
      - backend
    command: celery -A app.workers.background.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - NEXT_PUBLIC_SITE_URL=https://docuforge.pro
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
    # Do NOT mount ./frontend:/app here — it overwrites the production .next build

  frontend-dev:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - NEXT_PUBLIC_SITE_URL=https://docuforge.pro
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
    command: sh -c "npm install && npm run dev -- -p 3000"

volumes:
  redis_data:
  asset_data:
  frontend_node_modules:
